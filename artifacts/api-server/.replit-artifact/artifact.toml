kind = "api"
previewPath = "/api" # TODO - should be excluded from preview in the first place
title = "API Server"
version = "1.0.0"
id = "3B4_FFSkEVBkAeYMFRJ2e"

[[services]]
localPort = 8080
name = "API Server"
paths = ["/api"]

[services.development]
run = "pnpm --filter @workspace/api-server run dev"

# NOTE: This artifact is leftover starter scaffolding and is intentionally
# NOT deployed to production. Nothing in the active app (the Next.js
# `nabk-directory`) depends on `@workspace/api-server`, and its `paths =
# ["/api"]` would collide with the Next.js app's own `/api/auth/*`
# (NextAuth) and `/api/health` routes when published. The development
# `run` is preserved so the local sandbox keeps working unchanged; remove
# this artifact entirely if you decide it isn't needed.
