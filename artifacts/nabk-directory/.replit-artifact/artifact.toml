kind = "web"
previewPath = "/"
title = "دليل النبك"
version = "1.0.0"

[[services]]
localPort = 5000
name = "Web"
paths = ["/"]

[services.development]
run = "pnpm exec next dev --port 5000 --hostname 0.0.0.0"

[services.production]

[services.production.build]
args = ["pnpm", "exec", "next", "build"]

[services.production.build.env]
NODE_ENV = "production"

[services.production.run]
args = ["node", ".next/standalone/artifacts/nabk-directory/server.js"]

[services.production.run.env]
PORT = "5000"
HOSTNAME = "0.0.0.0"
NODE_ENV = "production"

[services.production.health.startup]
path = "/api/health"
