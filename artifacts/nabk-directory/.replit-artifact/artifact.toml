kind = "web"
previewPath = "/"
title = "دليل النبك"
version = "1.0.0"

[[services]]
localPort = 5000
name = "Web"
paths = ["/"]

[services.development]
run = "pnpm exec next dev --port 5000 --hostname 0.0.0.0"

[services.production]

# Use the package script (not `pnpm exec next build` directly) so the
# post-build assemble-standalone step runs and copies `.next/static` and
# `public/` into the standalone bundle. Without this, every static asset
# 404s in production.
[services.production.build]
args = ["pnpm", "--filter", "@workspace/nabk-directory", "run", "build"]

[services.production.build.env]
NODE_ENV = "production"

[services.production.run]
args = ["node", ".next/standalone/artifacts/nabk-directory/server.js"]

[services.production.run.env]
PORT = "5000"
HOSTNAME = "0.0.0.0"
NODE_ENV = "production"

[services.production.health.startup]
path = "/api/health"
